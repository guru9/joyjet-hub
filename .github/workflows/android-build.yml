name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch: 

permissions:
  contents: write
  packages: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- STEP 1: VALIDATION GATEKEEPER ---
  validate:
    name: 🩺 Validate Code & Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Expo Doctor
        # This will fail the build if your Expo SDK or peer dependencies are broken
        run: npx expo-doctor

      - name: Check for Critical Files
        run: |
          if [ ! -f "app.json" ]; then echo "app.json missing"; exit 1; fi
          if [ ! -f "package.json" ]; then echo "package.json missing"; exit 1; fi

  # --- STEP 2: ACTUAL BUILD (Only runs if Validate passes) ---
  build:
    name: 🏗️ Build Release APK
    needs: validate
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Automatic Version Bump
        id: bump
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          # Logic to bump patch version
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEXT_PATCH=$((patch + 1))
          NEXT_VERSION="$major.$minor.$NEXT_PATCH"

          # Get current versionCode from app.json
          CURRENT_VC=$(node -p "require('./app.json').expo.android.versionCode")
          NEXT_VC=$((CURRENT_VC + 1))

          echo "Bumping from $CURRENT_VERSION (VC: $CURRENT_VC) to $NEXT_VERSION (VC: $NEXT_VC)"

          # Update package.json
          npm version $NEXT_VERSION --no-git-tag-version

          # Update app.json using node for safety
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('./app.json', 'utf8'));
            app.expo.version = '$NEXT_VERSION';
            app.expo.android.versionCode = $NEXT_VC;
            fs.writeFileSync('./app.json', JSON.stringify(app, null, 2));
          "

          # Export for next steps
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Prebuild Android
        env:
          EXPO_USE_NPM: 1
        run: npx expo prebuild -p android --clean --no-install

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact (Temporary)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-internal
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 1

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Rolling Release (Permanent Latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Tactical Build (v${{ steps.bump.outputs.version }})"
          body: "This is the most recent build (v${{ steps.bump.outputs.version }}). Automatically generated after passing code validation."
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json app.json package-lock.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push origin main
