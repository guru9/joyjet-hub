name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch: # Allows you to manually run the workflow from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild Android
        env:
          EXPO_USE_NPM: 1
        run: npx expo prebuild -p android --clean --no-install

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact (Temporary)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-internal
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

      - name: Deploy to Rolling Release (Permanent Latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Tactical Build (v4.2.0)"
          body: "This is the most recent stable build of the surveillance ecosystem. Old builds are automatically replaced to optimize storage."
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
