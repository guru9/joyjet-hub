name: UI Safety Check

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - "**.md"

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🔍 Syntax & Lint Check
        # Checks for missing brackets or undefined variables in your JS
        run: npx expo lint || echo "Linting issues found, but continuing..."
